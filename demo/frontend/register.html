
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: linear-gradient(135deg, #1e1e2f, #2b2b45);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .box {
            background: #2f2f4a;
            padding: 35px;
            border-radius: 15px;
            width: 300px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            margin: 10px 0;
            width: 100%;
            border-radius: 8px;
            border: none;
            background: #44445f;
            color: white;
            outline: none;
        }

        input::placeholder {
            color: #bbb;
        }

        button {
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #ff5c5c;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #ff3b3b;
        }

        a {
            color: #ff7b7b;
            text-decoration: none;
        }

        p {
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>📝 Register</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Register</button>
    </form>

    <p>Đã có tài khoản? <a href="/login">Login</a></p>
</div>

</body>
</html>
