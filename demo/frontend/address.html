{% extends "base.html" %}

{% block content %}

<style>
.box {
    max-width: 350px;
    margin: 60px auto;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 25px;
    border-radius: 20px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #ff6b6b;
    color: white;
}
</style>

<h2 style="text-align:center;">📦 Shipping Address</h2>

<div class="box">
<form method="POST">

    <input name="name" placeholder="Full name" required>
    <input name="phone" placeholder="Phone number" required>
    <textarea name="address" placeholder="Address" required></textarea>

    <button type="submit">Continue</button>

</form>
</div>

{% endblock %}
